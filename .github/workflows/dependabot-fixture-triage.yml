# Auto-close Dependabot PRs that ONLY touch the deliberately-vulnerable fixtures.
# The eval corpus + research PoCs are vulnerable BY DESIGN, so a Dependabot bump of their deps must
# never be merged (it breaks the detection corpus). The pre-installed `gh` CLI + the default
# GITHUB_TOKEN can close such PRs.
#
# NOTE: alert *dismissal* is NOT automated here — the default GITHUB_TOKEN cannot access the
# Dependabot alerts API ("Resource not accessible by integration", HTTP 403); only a PAT can. To also
# auto-dismiss fixture alerts, add a PAT (scope `security_events` or classic `repo`) as a secret and a
# step: `env: GH_TOKEN: ${{ secrets.DEPENDABOT_TRIAGE_PAT }}` running
# `gh api repos/$REPO/dependabot/alerts?state=open --paginate --jq '.[]|select(.dependency.manifest_path|test("'"$FIXTURES"'"))|.number'`
# piped to `gh api -X PATCH .../dependabot/alerts/$n -f state=dismissed -f dismissed_reason=not_used`.
# CodeQL fixtures are already excluded via .github/codeql/codeql-config.yml paths-ignore.
name: dependabot-fixture-triage

on:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  workflow_dispatch:

permissions:
  pull-requests: write # close fixture-only Dependabot PRs
  contents: read

concurrency:
  group: fixture-triage
  cancel-in-progress: false

jobs:
  close-fixture-prs:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      FIXTURES: '^(evals/corpus/|docs/research/poc-)'
    steps:
      - name: Close Dependabot PRs that only touch fixture paths
        run: |
          set -euo pipefail
          gh pr list --repo "$REPO" --state open --json number,author,headRefName \
            --jq '.[] | select((.author.login | startswith("app/dependabot")) or (.headRefName | startswith("dependabot/"))) | .number' \
          | while read -r pr; do
              [ -n "${pr:-}" ] || continue
              files=$(gh pr view "$pr" --repo "$REPO" --json files --jq '.files[].path')
              [ -n "$files" ] || continue
              # close ONLY when every changed file is under a fixture path
              if ! printf '%s\n' "$files" | grep -vqE "$FIXTURES"; then
                echo "close Dependabot PR #$pr (fixtures only)"
                gh pr close "$pr" --repo "$REPO" --delete-branch \
                  --comment "Auto-triage: this bumps deliberately-vulnerable eval/PoC fixture deps, which must stay vulnerable for the detection corpus. Closing." || true
              fi
            done
