# OpenSSF Scorecard — scores THIS repo's own supply-chain security posture (branch protection,
# pinned deps, token permissions, dangerous workflows, …) and publishes a public score + badge.
# On-brand: white-hacker is itself a supply-chain-security tool (ADR-024..027), so we dogfood it.
# Badge (add to README after the first successful run):
#   https://api.securityscorecards.dev/projects/github.com/jaigouk/white-hacker/badge
# ADR-006: third-party Actions pinned to a commit SHA + a version comment.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "31 4 * * 1" # weekly — Monday 04:31 UTC
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF results to code scanning
      id-token: write # publish results to the OpenSSF API (required for the badge)
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2 (SHA resolved 2026-06-13)
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (SHA verified 2026-06-06)
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3 (SHA resolved 2026-06-13)
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true # required for the badge + the public Scorecard API

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4 (SHA resolved 2026-06-13)
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3 (SHA resolved 2026-06-13)
        with:
          sarif_file: results.sarif
