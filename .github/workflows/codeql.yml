# CodeQL code scanning (advanced setup).
# IMPORTANT: use EITHER this file OR the Security-tab "Default setup" for CodeQL — NOT both
# (GitHub rejects having both enabled). Since this file exists, leave Default setup OFF.
# ADR-006: third-party Actions pinned to a commit SHA + a version comment.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly — Monday 03:27 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF results to code scanning
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (SHA verified 2026-06-06)

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3 (SHA resolved 2026-06-13)
        with:
          languages: ${{ matrix.language }}
          # Query suite + fixture exclusions live in the config (keeps deliberately-vulnerable
          # eval-corpus / PoC fixtures out of analysis so they don't generate recurring alerts).
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3 (SHA resolved 2026-06-13)
        with:
          category: "/language:${{ matrix.language }}"
